name: Fetch Europe Temperature Grid

on:
  schedule:
    - cron: "0 */3 * * *"   # every 3 hours
  workflow_dispatch:          # allow manual trigger

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch temperature grid
        run: python scripts/fetch_europe_temp.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add by-project/europe-temperature/grid.json
          git diff --staged --quiet && echo "No changes" || \
            git commit -m "chore: update Europe temperature grid $(date -u +'%Y-%m-%d %H:%M UTC')" && \
            git push
